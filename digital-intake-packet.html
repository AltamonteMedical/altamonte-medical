<script id="menu-behavior-restore">
document.addEventListener('DOMContentLoaded', function(){
  var btn = document.getElementById('menuToggle');
  var menu = document.getElementById('mobileMenu');
  if(!btn || !menu) return;

  // ensure clean baseline
  menu.classList.remove('open');
  btn.setAttribute('aria-expanded', 'false');

  btn.addEventListener('click', function(e){
    e.preventDefault();
    e.stopPropagation();
    menu.classList.toggle('open');
    btn.setAttribute('aria-expanded', menu.classList.contains('open') ? 'true' : 'false');
  }, true);

  document.addEventListener('click', function(e){
    if(!menu.contains(e.target) && !btn.contains(e.target)){
      menu.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    }
  }, true);

  menu.querySelectorAll('a').forEach(function(link){
    link.addEventListener('click', function(){
      menu.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });
  });
});
</script>


<script id="packet-signature-script">
(function(){
  function setupSignatureCanvas(canvas){
    if(!canvas) return;

    function sizeCanvas(){
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#123a38';
      return ctx;
    }

    let ctx = sizeCanvas();
    let drawing = false;

    function pointFromEvent(e){
      const r = canvas.getBoundingClientRect();
      if (e.touches && e.touches.length){
        return {x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top};
      }
      if (e.changedTouches && e.changedTouches.length){
        return {x: e.changedTouches[0].clientX - r.left, y: e.changedTouches[0].clientY - r.top};
      }
      return {x: e.clientX - r.left, y: e.clientY - r.top};
    }

    function start(e){
      e.preventDefault();
      drawing = true;
      const p = pointFromEvent(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }
    function move(e){
      if(!drawing) return;
      e.preventDefault();
      const p = pointFromEvent(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
    }
    function end(e){
      if(!drawing) return;
      e.preventDefault();
      drawing = false;
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);

    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', move, {passive:false});
    canvas.addEventListener('touchend', end, {passive:false});
    canvas.addEventListener('touchcancel', end, {passive:false});

    const clearBtn = document.querySelector('[data-clear-for="' + canvas.id + '"]');
    if(clearBtn){
      clearBtn.addEventListener('click', function(e){
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);
      });
    }

    window.addEventListener('resize', function(){
      const old = canvas.toDataURL();
      ctx = sizeCanvas();
      const img = new Image();
      img.onload = function(){
        const rect = canvas.getBoundingClientRect();
        ctx.drawImage(img, 0, 0, rect.width, rect.height);
      };
      img.src = old;
    });
  }

  document.addEventListener('DOMContentLoaded', function(){
    document.querySelectorAll('.signature-canvas').forEach(setupSignatureCanvas);
  });
})();
</script>

<script id="actual-signature-pad-script">
(function(){
  function initPad(canvas){
    if(!canvas) return;
    const hidden = document.getElementById(canvas.id + 'Data');
    function sizeCanvas(){
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      ctx.lineWidth = 2.4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#123a38';
      return ctx;
    }
    let ctx = sizeCanvas();
    let drawing = false;

    function point(e){
      const r = canvas.getBoundingClientRect();
      if(e.touches && e.touches.length){
        return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
      }
      if(e.changedTouches && e.changedTouches.length){
        return {x:e.changedTouches[0].clientX-r.left, y:e.changedTouches[0].clientY-r.top};
      }
      return {x:e.clientX-r.left, y:e.clientY-r.top};
    }
    function save(){
      if(hidden){ hidden.value = canvas.toDataURL('image/png'); }
    }
    function start(e){
      e.preventDefault();
      drawing = true;
      const p = point(e);
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
    }
    function move(e){
      if(!drawing) return;
      e.preventDefault();
      const p = point(e);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      save();
    }
    function end(e){
      if(!drawing) return;
      e.preventDefault();
      drawing = false;
      save();
    }

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    canvas.addEventListener('mouseup', end);
    canvas.addEventListener('mouseleave', end);
    canvas.addEventListener('touchstart', start, {passive:false});
    canvas.addEventListener('touchmove', move, {passive:false});
    canvas.addEventListener('touchend', end, {passive:false});
    canvas.addEventListener('touchcancel', end, {passive:false});

    const clearBtn = document.querySelector("[data-clear-for='" + canvas.id + "']");
    if(clearBtn){
      clearBtn.addEventListener('click', function(e){
        e.preventDefault();
        const rect = canvas.getBoundingClientRect();
        ctx.clearRect(0, 0, rect.width, rect.height);
        if(hidden){ hidden.value = ''; }
      });
    }
  }

  document.addEventListener('DOMContentLoaded', function(){
    document.querySelectorAll('.signature-pad').forEach(initPad);
  });
})();
</script>
